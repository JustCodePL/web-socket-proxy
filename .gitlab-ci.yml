stages:
  - build

build:
  stage: build
  before_script:
    - docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_JOB_TOKEN
  script:
    - docker build
      -t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -f Dockerfile .
    - docker push ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
  tags:
    - docker-builder
